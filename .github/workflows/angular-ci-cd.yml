# ============================================================
# 🚀 CI/CD – Angular Frontend (Vercel)
# ============================================================

# 👉 This name appears in GitHub Actions UI
name: 🚀 Angular CI/CD (Vercel)

# ============================================================
# 🎯 TRIGGERS (WHEN WORKFLOW RUNS)
# ============================================================
on:
  # 👉 Runs automatically when you push to main branch
  push:
    branches:
      - main

  # 👉 Manual trigger from GitHub Actions UI
  workflow_dispatch:

# ============================================================
# 🏗 JOB DEFINITION
# ============================================================
jobs:
  deploy-angular:
    
    # 👉 Runs on GitHub hosted Linux machine
    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # 📥 STEP 1: CHECKOUT CODE
      # =====================================================
      - name: 🧾 Checkout Source Code
        uses: actions/checkout@v4
        # 👉 Pulls your GitHub repo into runner

      # =====================================================
      # 🟢 STEP 2: SETUP NODE ENVIRONMENT
      # =====================================================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
        # 👉 Installs Node.js (required for Angular build)

      # =====================================================
      # 📦 STEP 3: INSTALL DEPENDENCIES
      # =====================================================
      - name: 📦 Install Dependencies
        run: npm ci
        # 👉 Installs packages from package.json

      # =====================================================
      # 🏗 STEP 4: BUILD ANGULAR APP
      # =====================================================
      - name: 🏗 Build Angular App
        run: npm run build:prod
        # 👉 Creates production build (dist folder)

      # =====================================================
      # 📥 STEP 5: INSTALL VERCEL CLI
      # =====================================================
      - name: 📥 Install Vercel CLI
        run: npm install --global vercel
        # 👉 CLI tool used to deploy to Vercel

      # =====================================================
      # 🚀 STEP 6: DEPLOY TO VERCEL
      # =====================================================
      - name: 🚀 Deploy to Vercel
        run: |
          # 👉 Pull project config (links GitHub → Vercel)
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

          # 👉 Build project using Vercel environment
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

          # 👉 Deploy prebuilt output to Vercel
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          # 👉 These come from GitHub Secrets
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
