# ============================================================
# 🚀 CI/CD – Angular Frontend (Vercel)
# ============================================================

name: 🚀 CI/CD – Angular Frontend (Vercel) 

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "30 19 * * *"

jobs:
  ci-cd-angular:
    runs-on: ubuntu-latest

    env:
      LIVE_URL: https://angular-ecommerce-wheat.vercel.app/

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: 🧾 Checkout source code
        uses: actions/checkout@v4

      # =====================================================
      # BUILD TIMESTAMPS
      # =====================================================
      - name: ⏱️ Generate build timestamps
        run: |
          echo "BUILD_TIME_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "BUILD_TIME_IST=$(TZ=Asia/Kolkata date '+%Y-%m-%d %I:%M:%S %p IST')" >> $GITHUB_ENV

      # =====================================================
      # SETUP NODE
      # =====================================================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================
      - name: 📦 Install Dependencies
        run: npm ci

      # =====================================================
      # RUN TESTS
      # =====================================================
      - name: 🧪 Run Headless Tests
        run: npm run test:ci || echo "Tests not configured"

      # =====================================================
      # BUILD ANGULAR
      # =====================================================
      - name: 🏗 Build Production
        run: npm run build:prod

      # =====================================================
      # INSTALL VERCEL CLI
      # =====================================================
      - name: 📥 Install Vercel CLI
        run: npm install --global vercel

      # =====================================================
      # DEPLOY TO VERCEL
      # =====================================================
      - name: 🚀 Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # =====================================================
      # EMAIL SUCCESS
      # =====================================================
      - name: 📧 Deployment Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Angular Deployment Success"
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <h2>🚀 Angular Frontend Deployed Successfully</h2>
            <table border="1" cellpadding="8">
              <tr><td><b>Application</b></td><td>Angular E-Commerce</td></tr>
              <tr><td><b>Platform</b></td><td>Vercel</td></tr>
              <tr><td><b>Live URL</b></td>
                  <td><a href="${{ env.LIVE_URL }}">${{ env.LIVE_URL }}</a></td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>UTC Time</b></td><td>${{ env.BUILD_TIME_UTC }}</td></tr>
              <tr><td><b>IST Time</b></td><td>${{ env.BUILD_TIME_IST }}</td></tr>
              <tr><td><b>Status</b></td>
                  <td style="color:green;"><b>SUCCESS</b></td></tr>
            </table>

      # =====================================================
      # EMAIL FAILURE
      # =====================================================
      - name: ❌ Deployment Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Angular Deployment Failed"
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <h2 style="color:red;">❌ Angular Deployment Failed</h2>
            <table border="1" cellpadding="8">
              <tr><td><b>Application</b></td><td>Angular E-Commerce</td></tr>
              <tr><td><b>Live URL</b></td>
                  <td><a href="${{ env.LIVE_URL }}">${{ env.LIVE_URL }}</a></td></tr>
              <tr><td><b>UTC Time</b></td><td>${{ env.BUILD_TIME_UTC }}</td></tr>
              <tr><td><b>IST Time</b></td><td>${{ env.BUILD_TIME_IST }}</td></tr>
              <tr><td><b>Status</b></td>
                  <td style="color:red;"><b>FAILED</b></td></tr>
            </table>
