# ============================================================
# 🚀 CI/CD PIPELINE – ANGULAR FRONTEND (VERCEL)
# ============================================================

# 👉 Visible in GitHub Actions UI
name: 🚀 Angular CI/CD Pipeline (Vercel Deployment)

# ============================================================
# 🎯 TRIGGERS
# ============================================================
on:
  # 👉 Auto trigger on production branch
  push:
    branches:
      - main

  # 👉 Manual trigger from Actions tab
  workflow_dispatch:

# ============================================================
# 🏗 JOB: BUILD + DEPLOY
# ============================================================
jobs:
  deploy-angular-app:

    # 👉 GitHub runner (Linux VM)
    runs-on: ubuntu-latest

    # ========================================================
    # 🌍 ENVIRONMENT VARIABLES (OPTIONAL)
    # ========================================================
    env:
      APP_NAME: "Angular E-Commerce"
      DEPLOY_ENV: "Production"

    steps:

      # =====================================================
      # 📥 STEP 1: CHECKOUT SOURCE CODE
      # =====================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        # 👉 Pulls latest code from GitHub repo

      # =====================================================
      # 🟢 STEP 2: SETUP NODE.JS
      # =====================================================
      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
        # 👉 Installs Node.js and caches dependencies

      # =====================================================
      # 📦 STEP 3: INSTALL DEPENDENCIES
      # =====================================================
      - name: 📦 Install Project Dependencies
        run: npm ci
        # 👉 Clean install for consistent builds

      # =====================================================
      # 🧪 STEP 4: RUN TESTS (OPTIONAL SAFE MODE)
      # =====================================================
      - name: 🧪 Run Unit Tests
        run: npm run test:ci || echo "⚠️ Tests not configured, skipping..."
        # 👉 Prevents pipeline failure if tests are missing

      # =====================================================
      # 🏗 STEP 5: BUILD ANGULAR APPLICATION
      # =====================================================
      - name: 🏗 Build Angular Application (Production)
        run: npm run build:prod
        # 👉 Generates optimized production build (dist/)

      # =====================================================
      # 📥 STEP 6: INSTALL VERCEL CLI
      # =====================================================
      - name: 📥 Install Vercel CLI
        run: npm install --global vercel
        # 👉 Required for deployment commands

      # =====================================================
      # 🚀 STEP 7: DEPLOY TO VERCEL
      # =====================================================
      - name: 🚀 Deploy to Vercel (Production)
        run: |
          echo "🔗 Linking project with Vercel..."
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

          echo "🏗 Building project via Vercel..."
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

          echo "🚀 Deploying to Vercel..."
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

          echo "✅ Deployment Completed Successfully!"
        env:
          # 👉 Secure secrets from GitHub
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # =====================================================
      # 🎉 STEP 8: SUCCESS MESSAGE (LOG ONLY)
      # =====================================================
      - name: 🎉 Deployment Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Angular App Deployed Successfully!"
          echo "🌍 Environment : $DEPLOY_ENV"
          echo "📦 Application : $APP_NAME"
          echo "🔗 Platform    : Vercel"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
